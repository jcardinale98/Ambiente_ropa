<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Registro - Tienda de Ropa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css" />
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="index.html">
                Tienda Ropa
            </a>
        </div>
    </nav>

    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card" style="max-width: 420px; width: 100%">
            <div class="card-body p-5">
                
                <div class="text-center mb-4">
                    <h1 class="card-title mb-4 h5">Registro Usuario</h1>
                </div>

                <form class="needs-validation mt-3" novalidate id="registroForm">
                    
                    <div class="mb-3">
                        <label for="identificacion" class="form-label">Identificacion</label>
                        <input id="identificacion" type="text" class="form-control" required />
                    </div>

                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre Completo</label>
                        <input id="nombre" type="text" class="form-control" required />
                    </div>

                    <div class="mb-3">
                        <label for="correoElectronico" class="form-label">Correo Electronico</label>
                        <input id="correoElectronico" type="email" class="form-control" required />
                    </div>

                    <div class="mb-3">
                        <label for="contrasenna" class="form-label">Contraseña</label>
                        <input id="contrasenna" type="password" class="form-control" 
                               required minlength="6" />
                    </div>

                    <button class="btn btn-primary w-100" type="submit">Completar</button>
                </form>

                <div class="text-center mt-3 small text-muted">
                    ¿Ya tiene una cuenta?
                    <a href="login.html" class="link-primary">Inicio Session</a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/registro.js"></script>

</body>
</html>
